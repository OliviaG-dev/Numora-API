services:
  postgres:
    image: postgres:16-alpine
    container_name: numora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: numora
    ports:
      - "5432:5432"
    volumes:
      - numora_postgres_data:/var/lib/postgresql/data

volumes:
  numora_postgres_data:
